<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taniti - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a>
        <span>|</span>
        <a href="attractions.html">Attractions</a>
        <span>|</span>
        <a href="stay.html">Stay &amp; Transport</a>
        <span>|</span>
        <a href="about.html">About</a>
        <span>|</span>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <p>Questions</p>
        <p>About</p>
        <h1>Taniti?</h1>
    </div>

    <!-- Subheading -->
    <p style="text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 15px; margin-bottom: 10px;">
        Reach Out, We Are Here to Help!
    </p>

    <!-- Contact Form -->
    <div class="contact-form">

        <label for="name">Name:</label>
        <input type="text" id="name" name="name">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone">

        <label for="questions">Question(s):</label>
        <textarea id="questions" name="questions"></textarea>

        <div class="submit-wrap">
            <button type="submit">Submit</button>
        </div>

    </div>

    <!-- Social Media Section -->
    <div class="social-section">
        <h2>Check Out Our Social Media</h2>
        <div class="social-row">
            <div class="img-placeholder" style="width: 160px; height: 100px;">
                <span>[YOUTUBE]</span>
            </div>
            <div class="img-placeholder" style="width: 160px; height: 100px;">
                <span>[FACEBOOK]</span>
            </div>
            <div class="img-placeholder" style="width: 160px; height: 100px;">
                <span>[INSTAGRAM]</span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div>
            <button class="btn-small">Subscribe</button>
            &nbsp; To Our Newsletter
        </div>
        <div>
            &#9993; &nbsp; Social Media Links
        </div>
    </footer>

</body>
</html>
